# Complete Nginx Configuration for TMS and CRM (Fixed for Static Assets)
# Place this in /etc/nginx/sites-available/crm (or default)
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 130.211.211.214;

    # CRITICAL: Handle Next.js static assets FIRST (before other location blocks)
    # This ensures /tms/_next/static/* files are served correctly
    location ~ ^/tms/_next/static {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cache static assets
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # CRITICAL: Handle Next.js static assets for CRM
    location ~ ^/crm/_next/static {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cache static assets
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # CRM App - http://130.211.211.214/crm
    location ~ ^/crm(/.*)?$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # TMS App - http://130.211.211.214/tms
    location ~ ^/tms(/.*)?$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # CRITICAL: Handle /api/auth/* routes that NextAuth generates without basePath
    # Rewrite to include /tms prefix before proxying to TMS
    location ~ ^/api/auth(/.*)?$ {
        # Rewrite /api/auth/* to /tms/api/auth/* so Next.js basePath works
        # Use 'break' to stop processing and use the rewritten URI
        rewrite ^/api/auth(/.*)?$ /tms/api/auth$1 break;
        
        # Proxy to TMS - the rewritten URI will be used
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Important: Don't rewrite the Host header, let Next.js see the original
        proxy_set_header X-Forwarded-Prefix /tms;
    }

    # Default - redirect to CRM
    location / {
        return 301 /crm;
    }
}

