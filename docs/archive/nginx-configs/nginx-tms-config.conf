# Nginx Configuration for TMS
# Add this to your existing /etc/nginx/sites-available/crm file
# Or create a new file and symlink it

server {
    listen 80;
    server_name 34.121.40.233;

    # CRM App - http://34.121.40.233/crm
    location /crm {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Rewrite paths for Next.js
        rewrite ^/crm/?(.*)$ /$1 break;
    }

    # TMS App - http://34.121.40.233/tms
    location /tms {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Rewrite paths for Next.js
        rewrite ^/tms/?(.*)$ /$1 break;
    }

    # Default - redirect to CRM
    location / {
        return 301 /crm;
    }
}

