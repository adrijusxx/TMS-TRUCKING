# Complete Nginx Configuration for TMS and CRM
# Place this in /etc/nginx/sites-available/crm (or default)
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 34.121.40.233;

    # CRM App - http://34.121.40.233/crm
    location ~ ^/crm(/.*)?$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # TMS App - http://34.121.40.233/tms
    location ~ ^/tms(/.*)?$ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # CRITICAL: Handle /api/auth/* routes that NextAuth generates without basePath
    # Route to TMS by default (or use cookie-based routing if you prefer)
    location ~ ^/api/auth(/.*)?$ {
        # Option 1: Route all /api/auth/* to TMS (quick fix)
        proxy_pass http://localhost:3001;
        
        # Option 2: Route based on referer (uncomment to use)
        # set $backend "http://localhost:3000";
        # if ($http_referer ~* "/tms") {
        #     set $backend "http://localhost:3001";
        # }
        # proxy_pass $backend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Default - redirect to CRM
    location / {
        return 301 /crm;
    }
}

