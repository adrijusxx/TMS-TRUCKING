# Nginx Configuration for TMS (Fixed - No Redirect Loop)
# Use this configuration instead of the one that causes redirect loops

server {
    listen 80;
    server_name 34.121.40.233;

    # CRM App - http://34.121.40.233/crm
    location /crm {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Rewrite paths for Next.js
        rewrite ^/crm/?(.*)$ /$1 break;
    }

    # TMS App - http://34.121.40.233/tms
    # IMPORTANT: Remove the rewrite rule and use basePath in Next.js instead
    location /tms {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # DO NOT rewrite - let Next.js handle the /tms prefix with basePath
        # rewrite ^/tms/?(.*)$ /$1 break;  <-- REMOVE THIS LINE
    }

    # Default - redirect to CRM
    location / {
        return 301 /crm;
    }
}

